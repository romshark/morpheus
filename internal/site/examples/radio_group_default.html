<neo-radio-group data-signals="{radio_group_value: 'email'}" data-attr:value="$radio_group_value" aria-label="Notification channel">
  <label style="display:inline-flex;align-items:center;gap:0.5rem;cursor:pointer">
    <neo-radio value="email"></neo-radio>
    <span>Email</span>
  </label>
  <label style="display:inline-flex;align-items:center;gap:0.5rem;cursor:pointer">
    <neo-radio value="sms"></neo-radio>
    <span>SMS</span>
  </label>
  <label style="display:inline-flex;align-items:center;gap:0.5rem;cursor:pointer">
    <neo-radio value="push"></neo-radio>
    <span>Push notification</span>
  </label>
  <label style="display:inline-flex;align-items:center;gap:0.5rem;cursor:pointer">
    <neo-radio value="none"></neo-radio>
    <span>None</span>
  </label>
</neo-radio-group>
