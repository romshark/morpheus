<neo-navgroup
  data-signals="{navgroup_orientation: 'horizontal'}"
  data-attr:orientation="$navgroup_orientation"
  wrap
  role="toolbar"
  aria-label="Text formatting"
>
  <neo-button data-neo-navgroup-item aria-label="Bold"><b>B</b></neo-button>
  <neo-button data-neo-navgroup-item aria-label="Italic"><i>I</i></neo-button>
  <neo-button data-neo-navgroup-item aria-label="Underline"><u>U</u></neo-button>
  <neo-button data-neo-navgroup-item aria-label="Strikethrough"><s>S</s></neo-button>
</neo-navgroup>
