<neo-combobox
  data-signals="{combobox_value: 'berlin'}"
  data-attr:value="$combobox_value"
  aria-label="City"
  placeholder="Pick a city"
  search-placeholder="Search cities…"
>
  <neo-option value="amsterdam">Amsterdam</neo-option>
  <neo-option value="berlin">Berlin</neo-option>
  <neo-option value="copenhagen">Copenhagen</neo-option>
  <neo-option value="dublin">Dublin</neo-option>
  <neo-option value="edinburgh">Edinburgh</neo-option>
  <neo-option value="florence">Florence</neo-option>
  <neo-option value="geneva">Geneva</neo-option>
  <neo-option value="helsinki">Helsinki</neo-option>
  <neo-option value="istanbul">Istanbul</neo-option>
  <neo-option value="lisbon">Lisbon</neo-option>
  <neo-option value="london">London</neo-option>
  <neo-option value="madrid">Madrid</neo-option>
  <neo-option value="oslo">Oslo</neo-option>
  <neo-option value="paris">Paris</neo-option>
  <neo-option value="prague">Prague</neo-option>
  <neo-option value="rome">Rome</neo-option>
  <neo-option value="stockholm">Stockholm</neo-option>
  <neo-option value="vienna">Vienna</neo-option>
  <neo-option value="warsaw">Warsaw</neo-option>
  <neo-option value="zurich">Zürich</neo-option>
  <div data-neo-empty-results>
    No cities match &#34;<span data-neo-empty-query></span>&#34;.
  </div>
</neo-combobox>
