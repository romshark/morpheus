<neo-drawer data-signals="{drawer_side: 'right'}" data-attr:side="$drawer_side">
  <neo-button data-neo-drawer-trigger>Open drawer</neo-button>
  <dialog>
    <header data-neo-drawer-header>
      <h2 data-neo-drawer-title>Notification preferences</h2>
    </header>
    <div data-neo-drawer-body>
      <p>Choose how you'd like to be notified about updates and activity.</p>
      <p>You can change these settings any time.</p>
    </div>
    <footer data-neo-drawer-footer>
      <neo-button data-neo-drawer-close>Cancel</neo-button>
      <neo-button variant="primary" data-neo-drawer-close>Save</neo-button>
    </footer>
  </dialog>
</neo-drawer>
