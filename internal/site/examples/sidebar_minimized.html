<style>
  .sb-shell {
    display: flex;
    align-self: stretch;
    width: 100%;
    min-height: 22rem;
    border: 1px solid var(--btn-border);
    border-radius: var(--page-radius, 0.5rem);
    overflow: hidden;
    background: var(--page-bg);
    container-type: inline-size;
    container-name: neo-sidebar-shell;
    contain: paint;
  }
  /* Suppress the header separator inside the preview only. */
  .sb-shell neo-sidebar > [data-neo-sidebar-header] {
    border-bottom: none;
  }
  /* neo-sidebar's height:100% resolves to auto when the stage has no
     definite height; align-self:stretch lets the flex line stretch fill
     the in-flow sidebar so the sibling can't overhang its border. */
  .sb-shell > neo-sidebar:not([overlay]):not([data-neo-sidebar-overlay]) {
    height: auto;
    align-self: stretch;
  }
  /* flex-shrink:0 so a drag-set inline width holds; collapse the wrapper
     when the sidebar closes or goes overlay (width persists via
     --neo-resizable-width). */
  .sb-shell > neo-resizable {
    flex-shrink: 0;
  }
  .sb-shell > neo-resizable:has(> neo-sidebar:defined:not([open])),
  .sb-shell > neo-resizable:has(> neo-sidebar[data-neo-sidebar-overlay]) {
    width: 0 !important;
    min-width: 0 !important;
    max-width: 0 !important;
    flex-basis: 0;
  }
  .sb-shell > neo-resizable:has(> neo-sidebar:defined:not([open])) > [data-neo-resize-handle],
  .sb-shell > neo-resizable:has(> neo-sidebar[data-neo-sidebar-overlay]) > [data-neo-resize-handle] {
    display: none;
  }
  .sb-shell .sb-main {
    flex: 1 1 auto;
    display: flex;
    flex-direction: column;
    min-width: 0;
  }
  .sb-shell .sb-bar {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    padding: 0.75rem;
    border-bottom: 1px solid var(--btn-border);
  }
  .sb-shell .sb-body {
    flex: 1 1 auto;
    padding: 1rem;
    overflow-y: auto;
  }
  .sb-shell .sb-body p {
    margin: 0;
    color: var(--muted);
    max-width: 36rem;
  }
  /* Compact wide-mode closed rail. */
  .sb-shell [data-neo-sidebar-minimized] {
    justify-content: flex-start;
  }
  .sb-shell [data-neo-sidebar-minimized] > neo-button {
    width: 100%;
    aspect-ratio: 1;
    padding: 0;
  }
</style>
<neo-layout class="sb-shell">
  <neo-sidebar id="demo-sidebar-minimized">
    <header data-neo-sidebar-header>
      <span>Projects</span>
      <neo-button data-neo-sidebar-close aria-label="Minimize projects sidebar">
        <neo-icon name="x"></neo-icon>
      </neo-button>
    </header>
    <nav data-neo-sidebar-content aria-label="Project nav">
      <neo-navgroup orientation="vertical" wrap role="menu" style="width:100%">
        <neo-button data-neo-navgroup-item><neo-icon name="star"></neo-icon> Starred</neo-button>
        <neo-button data-neo-navgroup-item><neo-icon name="folder"></neo-icon> Files</neo-button>
        <neo-button data-neo-navgroup-item><neo-icon name="message-square"></neo-icon> Messages</neo-button>
        <neo-button data-neo-navgroup-item><neo-icon name="settings"></neo-icon> Settings</neo-button>
      </neo-navgroup>
    </nav>
    <div data-neo-sidebar-minimized aria-label="Project nav minimized">
      <neo-button aria-label="Open projects sidebar" data-on:click="document.getElementById('demo-sidebar-minimized').show()">
        <neo-icon name="menu"></neo-icon>
      </neo-button>
      <neo-button aria-label="Starred" data-on:click="document.getElementById('demo-sidebar-minimized').show()">
        <neo-icon name="star"></neo-icon>
      </neo-button>
      <neo-button aria-label="Files" data-on:click="document.getElementById('demo-sidebar-minimized').show()">
        <neo-icon name="folder"></neo-icon>
      </neo-button>
      <neo-button aria-label="Messages" data-on:click="document.getElementById('demo-sidebar-minimized').show()">
        <neo-icon name="message-square"></neo-icon>
      </neo-button>
    </div>
  </neo-sidebar>
  <neo-layout class="sb-main" column>
    <header class="sb-bar">
      <neo-button aria-label="Toggle projects sidebar" data-on:click="document.getElementById('demo-sidebar-minimized').toggle()">
        <neo-icon name="menu"></neo-icon>
      </neo-button>
      <strong>Workspace</strong>
    </header>
    <div class="sb-body">
      <p>
        Close the sidebar from its header to turn it into a compact
        rail. The rail is normal sidebar content, so it can hold icon
        buttons, account switchers, or any other compact controls.
      </p>
    </div>
  </neo-layout>
</neo-layout>
