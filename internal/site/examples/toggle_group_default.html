<neo-toggle-group data-signals="{toggle_group_value: 'italic'}" data-attr:value="$toggle_group_value" aria-label="Text formatting">
  <neo-toggle value="bold" aria-label="Bold">B</neo-toggle>
  <neo-toggle value="italic" aria-label="Italic"><em>I</em></neo-toggle>
  <neo-toggle value="underline" aria-label="Underline"><u>U</u></neo-toggle>
</neo-toggle-group>
