<neo-sortable
  data-signals="{sortable_orientation: 'vertical'}"
  data-attr:orientation="$sortable_orientation"
  style="width: 100%;"
>
  <div id="design" data-neo-sortable-item>
    <span data-neo-sortable-handle aria-hidden="true"><neo-icon name="grip-vertical"></neo-icon></span>
    Design
  </div>
  <div id="build" data-neo-sortable-item>
    <span data-neo-sortable-handle aria-hidden="true"><neo-icon name="grip-vertical"></neo-icon></span>
    Build
  </div>
  <div id="test" data-neo-sortable-item>
    <span data-neo-sortable-handle aria-hidden="true"><neo-icon name="grip-vertical"></neo-icon></span>
    Test
  </div>
  <div id="ship" data-neo-sortable-item>
    <span data-neo-sortable-handle aria-hidden="true"><neo-icon name="grip-vertical"></neo-icon></span>
    Ship
  </div>
</neo-sortable>
