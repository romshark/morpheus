<neo-alert
  data-signals="{alert_variant: 'warning'}"
  data-attr:variant="$alert_variant"
>
  <div data-neo-alert-icon aria-hidden="true">
    <neo-icon name="triangle-alert"></neo-icon>
  </div>
  <div data-neo-alert-content>
    <h3 data-neo-alert-title>Sync paused</h3>
    <p data-neo-alert-description>
      New changes are queued locally until the connection is restored.
    </p>
  </div>
</neo-alert>
