<neo-input-group
  data-signals="{inputgroup_prefix: 'https://', inputgroup_placeholder: 'example.com', inputgroup_disabled: false}"
>
  <span data-text="$inputgroup_prefix"></span>
  <input
    type="text"
    data-attr:placeholder="$inputgroup_placeholder"
    data-attr:disabled="$inputgroup_disabled"
  />
  <neo-button aria-label="Go">
    <neo-icon name="arrow-right"></neo-icon>
  </neo-button>
</neo-input-group>
