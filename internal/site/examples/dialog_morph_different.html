<neo-dialog id="dialog-morph-host" data-preserve-attr="open">
  <neo-button data-neo-dialog-trigger>What's new</neo-button>
  <dialog id="dialog-morph-surface" data-preserve-attr="open">
    <header data-neo-dialog-header>
      <h2 data-neo-dialog-title>Release notes</h2>
    </header>
    <neo-elastic>
      <div style="display: flex; flex-direction: column; gap: 0.5rem;">
        <p style="margin: 0;">A later patch swapped in a longer changelog.</p>
        <ul style="margin: 0; padding-left: 1.25rem; display: flex; flex-direction: column; gap: 0.25rem;">
          <li>New dashboard layout</li>
          <li>Faster search</li>
          <li>Keyboard shortcuts for every action</li>
          <li>Dark-mode contrast fixes</li>
          <li>Offline draft recovery</li>
        </ul>
        <p style="margin: 0;">The dialog animates to the new height inside its &lt;neo-elastic&gt; body.</p>
      </div>
    </neo-elastic>
    <footer data-neo-dialog-footer>
      <neo-button data-neo-dialog-close>Close</neo-button>
    </footer>
  </dialog>
</neo-dialog>
