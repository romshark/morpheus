<neo-card variant="elevated">
  <div data-neo-card-inner>
    <div data-neo-card-media style="
      background: linear-gradient(135deg, #6366f1, #ec4899);"></div>
    <div data-neo-card-header>
      <h3 data-neo-card-title>Card title</h3>
      <p data-neo-card-description>A short supporting line beneath the title.</p>
      <div data-neo-card-actions>
        <neo-button variant="ghost">Action</neo-button>
      </div>
    </div>
    <div data-neo-card-body>
      Card body content goes here. Edit this HTML to see the layout
      update live.
    </div>
    <div data-neo-card-footer>
      <neo-button>Cancel</neo-button>
      <neo-button variant="primary">Confirm</neo-button>
    </div>
  </div>
</neo-card>
