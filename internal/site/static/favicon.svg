    <rect x="596" y="240" width="80" height="48" fill="#4b3732"/>
    <rect x="676" y="224" width="96" height="64" fill="#362b2a"/>

    <rect x="288" y="304" width="80" height="48" fill="#453331"/>
    <rect x="368" y="320" width="164" height="32" fill="#5a4039"/>
    <rect x="532" y="304" width="80" height="48" fill="#453331"/>
