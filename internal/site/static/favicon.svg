  <!-- pixel texture marks on skin -->
  <g opacity=".8">
    <rect x="176" y="272" width="8" height="8" fill="#2b2423"/>
    <rect x="224" y="288" width="8" height="8" fill="#2b2423"/>
    <rect x="272" y="272" width="8" height="8" fill="#352827"/>
    <rect x="632" y="272" width="8" height="8" fill="#2b2423"/>
    <rect x="680" y="288" width="8" height="8" fill="#2b2423"/>
    <rect x="720" y="264" width="8" height="8" fill="#352827"/>
    <rect x="336" y="64" width="8" height="8" fill="#5a3230"/>
    <rect x="456" y="40" width="8" height="8" fill="#5a3230"/>
    <rect x="528" y="64" width="8" height="8" fill="#5a3230"/>
    <rect x="248" y="48" width="8" height="8" fill="#2d2927"/>
    <rect x="648" y="48" width="8" height="8" fill="#2d2927"/>
