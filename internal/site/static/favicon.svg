<svg width="900" height="384" viewBox="0 0 900 384" xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Pixel art abstract close-up portrait with dark sunglasses</title>
  <desc id="desc">A blocky pixel-art interpretation of a close-up face with dark skin tones, round black sunglasses, nose, ears, and small bridge hardware.</desc>

  <rect width="900" height="384" fill="#10191b"/>

  <!-- pixel-grid background -->
  <g opacity=".9">
    <rect x="0" y="0" width="96" height="384" fill="#142022"/>
    <rect x="96" y="0" width="96" height="384" fill="#1a2527"/>
    <rect x="192" y="0" width="96" height="384" fill="#172123"/>
    <rect x="288" y="0" width="96" height="384" fill="#202b2b"/>
    <rect x="384" y="0" width="96" height="384" fill="#1e292a"/>
    <rect x="480" y="0" width="96" height="384" fill="#202b2b"/>
    <rect x="576" y="0" width="96" height="384" fill="#172123"/>
    <rect x="672" y="0" width="96" height="384" fill="#1a2527"/>
    <rect x="768" y="0" width="132" height="384" fill="#142022"/>
  </g>

  <!-- ears -->
  <g>
    <rect x="32" y="96" width="32" height="48" fill="#4b2f2b"/>
    <rect x="32" y="144" width="48" height="96" fill="#6a443e"/>
    <rect x="48" y="240" width="48" height="64" fill="#4a302d"/>
