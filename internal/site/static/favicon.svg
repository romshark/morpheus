    <rect x="272" y="0" width="80" height="32" fill="#8a6d60"/>
    <rect x="352" y="0" width="96" height="48" fill="#9b7c6d"/>
    <rect x="448" y="0" width="96" height="40" fill="#8e6f62"/>
    <rect x="544" y="0" width="80" height="32" fill="#76594f"/>
    <rect x="624" y="0" width="80" height="40" fill="#5e453e"/>

