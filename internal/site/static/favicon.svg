    <rect x="80" y="208" width="16" height="48" fill="#3b2929"/>

    <rect x="836" y="96" width="32" height="48" fill="#5e3934"/>
    <rect x="820" y="144" width="48" height="96" fill="#8a5a51"/>
    <rect x="804" y="240" width="48" height="64" fill="#5c3935"/>
    <rect x="804" y="128" width="32" height="160" fill="#9a655c"/>
    <rect x="820" y="160" width="16" height="80" fill="#302527"/>
    <rect x="804" y="208" width="16" height="48" fill="#4a3030"/>
  </g>

  <!-- face base -->
  <g>
    <rect x="96" y="0" width="704" height="384" fill="#5a3d36"/>

    <!-- blocky facial planes -->
    <rect x="96" y="0" width="96" height="384" fill="#3f302d"/>
    <rect x="192" y="0" width="96" height="384" fill="#5a3e37"/>
    <rect x="288" y="0" width="96" height="384" fill="#76554b"/>
    <rect x="384" y="0" width="128" height="384" fill="#826054"/>
    <rect x="512" y="0" width="96" height="384" fill="#715047"/>
    <rect x="608" y="0" width="96" height="384" fill="#563b35"/>
    <rect x="704" y="0" width="96" height="384" fill="#3f302d"/>

