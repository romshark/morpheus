    <rect x="336" y="96" width="32" height="32" fill="#0b0c09"/>
    <rect x="128" y="128" width="16" height="64" fill="#090908"/>
    <rect x="368" y="128" width="16" height="64" fill="#090908"/>
    <rect x="144" y="224" width="32" height="16" fill="#0b0b09"/>
    <rect x="336" y="224" width="32" height="16" fill="#0b0b09"/>

    <rect x="532" y="96" width="32" height="32" fill="#0c0c09"/>
    <rect x="724" y="96" width="32" height="32" fill="#0b0c09"/>
    <rect x="516" y="128" width="16" height="64" fill="#090908"/>
    <rect x="756" y="128" width="16" height="64" fill="#090908"/>
    <rect x="532" y="224" width="32" height="16" fill="#0b0b09"/>
    <rect x="724" y="224" width="32" height="16" fill="#0b0b09"/>

