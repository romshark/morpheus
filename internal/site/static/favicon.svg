  <!-- blocky nose -->
  <g>
    <rect x="416" y="160" width="64" height="48" fill="#8f6c60"/>
    <rect x="400" y="208" width="96" height="48" fill="#7f5c52"/>
    <rect x="384" y="256" width="128" height="32" fill="#6e4d45"/>
    <rect x="368" y="288" width="48" height="32" fill="#3b2b29"/>
    <rect x="416" y="288" width="64" height="32" fill="#7a574d"/>
    <rect x="480" y="288" width="48" height="32" fill="#3b2b29"/>

    <rect x="432" y="176" width="32" height="96" fill="#a07b6c"/>
    <rect x="464" y="224" width="16" height="48" fill="#8a665a"/>
    <rect x="400" y="272" width="24" height="16" fill="#513933"/>
    <rect x="476" y="272" width="24" height="16" fill="#513933"/>
