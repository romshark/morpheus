    <rect x="256" y="104" width="16" height="16" fill="#24281c"/>
    <rect x="612" y="80" width="32" height="16" fill="#b4beb1"/>
    <rect x="644" y="96" width="16" height="16" fill="#5d684e"/>
    <rect x="692" y="112" width="16" height="80" fill="#3d3413"/>
